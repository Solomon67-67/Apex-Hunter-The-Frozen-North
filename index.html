<!DOCTYPE html>
<html>
<head>
  <title>Apex Huntter</title>
</head>
  <body>
    <div id="root"></div>
    <script type="importmap">
      {
        "imports": {
           "react': "https://esm.sh/react@18",
           "react-dom":https://esm.sh/react-dom@18
           "three": "https://esm.sh/three@0.160.0",
           "lucide-react": "https://esm.sh/lucide-react",
           "firebase/app": 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"
           "firebase/firestore":https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
           "firebase/auth": "https://www.gstatic.cpm/firebasejs/10.7.1/firebase-auth.js"
       }
    }
    </script>
    <script type="module">
import React, { useState, useEffect, useRef } from 'react';
import { initializeApp } from 'firebase/app';
import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from 'firebase/firestore';
import * as THREE from 'three';
import { 
  LucideBackpack, 
  LucideFlashlight, 
  LucideTarget, 
  LucideActivity, 
  LucideSword, 
  LucideX,
  LucideZap,
  LucideEye
} from 'lucide-react';

const firebaseConfig = JSON.parse(__firebase_config);
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const appId = typeof __app_id !== 'undefined' ? __app_id : 'forest-survival-100';

const ITEMS = {
  knife: { id: 'knife', name: "Stone Knife", icon: <LucideSword className="w-6 h-6" />, type: 'weapon', damage: 15 },
  flashlight: { id: 'flashlight', name: "Flashlight", icon: <LucideFlashlight className="w-6 h-6" />, type: 'utility' },
  bandage: { id: 'bandage', name: "Bandage", icon: <LucideActivity className="w-6 h-6" />, type: 'consumable', heal: 25 },
  pistol: { id: 'pistol', name: "Scout Pistol", icon: <LucideTarget className="w-6 h-6" />, type: 'weapon', damage: 30 },
};

export default function App() {
  const [user, setUser] = useState(null);
  const [gameState, setGameState] = useState('menu');
  const [showBackpack, setShowBackpack] = useState(false);
  const [health, setHealth] = useState(100);
  const [battery, setBattery] = useState(100);
  const [nightsSurvived, setNightsSurvived] = useState(0);
  
  // Inventory State
  const [hotbar, setHotbar] = useState(['knife', 'flashlight', 'bandage', null, null]);
  const [activeSlot, setActiveSlot] = useState(0);
  const [backpack, setBackpack] = useState(['pistol']);

  const containerRef = useRef();
  const gameRef = useRef({
    scene: null, camera: null, renderer: null, player: null, 
    flashlightObj: null,
    joystick: { active: false, startX: 0, startY: 0, moveX: 0, moveY: 0 },
    look: { x: 0, y: 0, lat: 0, lon: 0 },
  });

  // --- Auth & Multiplayer ---
  useEffect(() => {
    const initAuth = async () => {
      if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
        await signInAnonymously(auth);
      } else {
        await signInAnonymously(auth);
      }
    };
    initAuth();
    const unsubscribe = onAuthStateChanged(auth, setUser);
    return () => unsubscribe();
  }, []);

  useEffect(() => {
    if (!user || gameState !== 'playing') return;
    const playersRef = collection(db, 'artifacts', appId, 'public', 'data', 'players');
    
    const interval = setInterval(() => {
      if (!gameRef.current.player) return;
      setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid), {
        x: gameRef.current.player.position.x,
        z: gameRef.current.player.position.z,
        rot: gameRef.current.player.rotation.y,
        equipped: hotbar[activeSlot],
        health,
        lastSeen: Date.now()
      });
    }, 200);

    return () => {
      clearInterval(interval);
      deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', user.uid));
    };
  }, [user, gameState, activeSlot, hotbar, health]);

  // --- Game Loop & Logic ---
  useEffect(() => {
    if (gameState !== 'playing') return;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x010201);
    scene.fog = new THREE.FogExp2(0x010201, 0.15);
    gameRef.current.scene = scene;

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    gameRef.current.camera = camera;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    containerRef.current.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0x050805, 0.1);
    scene.add(ambient);
    
    const spotLight = new THREE.SpotLight(0xfff4e0, 2.5, 45, Math.PI/7, 0.4);
    spotLight.castShadow = true;
    camera.add(spotLight);
    spotLight.position.set(0, 0, 0.5);
    spotLight.target.position.set(0, 0, -10);
    camera.add(spotLight.target);
    gameRef.current.flashlightObj = spotLight;

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(1000, 1000),
      new THREE.MeshStandardMaterial({ color: 0x050a05 })
    );
    ground.rotation.x = -Math.PI/2;
    scene.add(ground);

    for(let i=0; i<300; i++) {
        const tree = new THREE.Group();
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.25, 5), new THREE.MeshStandardMaterial({color: 0x110a00}));
        trunk.position.y = 2.5;
        tree.add(trunk);
        const foliage = new THREE.Mesh(new THREE.ConeGeometry(1.5, 4, 5), new THREE.MeshStandardMaterial({color: 0x021102}));
        foliage.position.y = 5;
        tree.add(foliage);
        tree.position.set((Math.random()-0.5)*400, 0, (Math.random()-0.5)*400);
        scene.add(tree);
    }

    const player = new THREE.Group();
    scene.add(player);
    gameRef.current.player = player;

    const animate = () => {
      if (gameState !== 'playing') return;
      requestAnimationFrame(animate);

      // Movement
      const joy = gameRef.current.joystick;
      if (joy.active) {
        const speed = 0.12;
        const moveX = (Math.sin(player.rotation.y + Math.PI/2) * joy.moveX + Math.sin(player.rotation.y) * joy.moveY) * speed;
        const moveZ = (Math.cos(player.rotation.y + Math.PI/2) * joy.moveX + Math.cos(player.rotation.y) * joy.moveY) * speed;
        player.position.x += moveX;
        player.position.z += moveZ;
      }

      camera.position.copy(player.position);
      camera.position.y = 1.6 + Math.sin(Date.now() * 0.004) * 0.03; // Head bob
      camera.rotation.order = 'YXZ';
      camera.rotation.y = gameRef.current.look.lon;
      camera.rotation.x = gameRef.current.look.lat;
      player.rotation.y = gameRef.current.look.lon;

      renderer.render(scene, camera);
    };
    animate();

    const handleKeyDown = (e) => {
      if (['1','2','3','4','5'].includes(e.key)) setActiveSlot(parseInt(e.key)-1);
      if (e.key.toLowerCase() === 'b') setShowBackpack(p => !p);
    };
    window.addEventListener('keydown', handleKeyDown);

    return () => {
      window.removeEventListener('keydown', handleKeyDown);
      renderer.dispose();
      if(containerRef.current) containerRef.current.innerHTML = '';
    };
  }, [gameState]);

  // Battery drain logic
  useEffect(() => {
    if (gameState === 'playing' && hotbar[activeSlot] === 'flashlight') {
      const timer = setInterval(() => {
        setBattery(b => Math.max(0, b - 0.2));
        if (gameRef.current.flashlightObj) {
           gameRef.current.flashlightObj.intensity = battery > 0 ? 2.5 : 0.05;
        }
      }, 500);
      return () => clearInterval(timer);
    } else if (gameRef.current.flashlightObj) {
        gameRef.current.flashlightObj.intensity = 0.05;
    }
  }, [gameState, activeSlot, hotbar, battery]);

  const handleTouchStart = (e) => {
    const touch = e.touches[0];
    if (touch.clientX < window.innerWidth / 2) {
      gameRef.current.joystick = { active: true, startX: touch.clientX, startY: touch.clientY, moveX: 0, moveY: 0 };
    }
  };

  const handleTouchMove = (e) => {
    const touch = e.touches[0];
    const joy = gameRef.current.joystick;
    if (joy.active) {
      const dx = touch.clientX - joy.startX;
      const dy = touch.clientY - joy.startY;
      const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
      const angle = Math.atan2(dy, dx);
      joy.moveX = (Math.cos(angle) * dist) / 40;
      joy.moveY = -(Math.sin(angle) * dist) / 40;
    } else {
      const movementX = e.movementX || (touch.clientX - (gameRef.current.lastTouchX || touch.clientX));
      const movementY = e.movementY || (touch.clientY - (gameRef.current.lastTouchY || touch.clientY));
      gameRef.current.look.lon -= movementX * 0.005;
      gameRef.current.look.lat -= movementY * 0.005;
      gameRef.current.look.lat = Math.max(-1.4, Math.min(1.4, gameRef.current.look.lat));
    }
    gameRef.current.lastTouchX = touch.clientX;
    gameRef.current.lastTouchY = touch.clientY;
  };

  const moveToHotbar = (itemId, backpackIdx) => {
    const emptyIdx = hotbar.indexOf(null);
    if (emptyIdx !== -1) {
      const newHotbar = [...hotbar];
      newHotbar[emptyIdx] = itemId;
      setHotbar(newHotbar);
      setBackpack(backpack.filter((_, i) => i !== backpackIdx));
    }
  };

  return (
    <div className="relative w-full h-screen bg-black overflow-hidden font-mono select-none text-white">
      <div 
        ref={containerRef} 
        className="w-full h-full"
        onTouchStart={handleTouchStart}
        onTouchMove={handleTouchMove}
        onTouchEnd={() => { gameRef.current.joystick.active = false; gameRef.current.lastTouchX = null; }}
        onMouseMove={(e) => {
          if (gameState === 'playing' && !showBackpack) {
            gameRef.current.look.lon -= e.movementX * 0.002;
            gameRef.current.look.lat -= e.movementY * 0.002;
            gameRef.current.look.lat = Math.max(-1.4, Math.min(1.4, gameRef.current.look.lat));
          }
        }}
      />

      {gameState === 'menu' && (
        <div className="absolute inset-0 bg-black/90 flex flex-col items-center justify-center z-50 p-6">
          <h1 className="text-6xl font-black italic text-red-700 mb-2">100 NIGHTS</h1>
          <p className="text-zinc-500 tracking-[0.3em] mb-12">SURVIVAL PROTOCOL</p>
          <button 
            onClick={() => { setGameState('playing'); containerRef.current.requestPointerLock?.(); }}
            className="px-12 py-4 bg-red-700 hover:bg-red-600 font-bold tracking-widest transition-all"
          >
            START NIGHT 1
          </button>
        </div>
      )}

      {gameState === 'playing' && (
        <>
          <div className="absolute top-6 left-6 space-y-4 pointer-events-none">
            <div className="bg-black/40 p-3 rounded-lg border border-white/10 backdrop-blur-md">
              <div className="flex justify-between items-center w-48 mb-1">
                <span className="text-[10px] text-red-500 font-bold uppercase">Condition</span>
                <span className="text-xs font-bold">{health}%</span>
              </div>
              <div className="w-48 h-1.5 bg-zinc-900 overflow-hidden rounded-full">
                <div className="h-full bg-red-600 transition-all" style={{ width: `${health}%` }} />
              </div>
            </div>
            
            <div className="bg-black/40 p-3 rounded-lg border border-white/10 backdrop-blur-md">
               <div className="flex items-center gap-2 mb-1">
                <LucideZap size={12} className="text-yellow-500" />
                <span className="text-[10px] text-yellow-500 font-bold uppercase">Power</span>
              </div>
              <div className="w-32 h-1 bg-zinc-900 overflow-hidden rounded-full">
                <div className="h-full bg-yellow-500" style={{ width: `${battery}%` }} />
              </div>
            </div>
          </div>

          <div className="absolute top-6 right-6">
            <button onClick={() => setShowBackpack(true)} className="p-4 bg-zinc-900/80 border border-white/10 rounded-xl hover:bg-zinc-800 transition-all">
              <LucideBackpack size={24} />
            </button>
          </div>

          <div className="absolute bottom-8 left-1/2 -translate-x-1/2 flex gap-2 p-2 bg-black/60 backdrop-blur-xl rounded-2xl border border-white/10">
            {hotbar.map((itemId, idx) => (
              <div 
                key={idx}
                onClick={() => setActiveSlot(idx)}
                className={`w-14 h-14 md:w-16 md:h-16 flex items-center justify-center rounded-xl border-2 transition-all cursor-pointer relative
                  ${activeSlot === idx ? 'border-red-600 bg-red-600/20 shadow-[0_0_15px_rgba(220,38,38,0.3)]' : 'border-white/5 bg-zinc-900/80 hover:bg-zinc-800'}`}
              >
                {itemId && ITEMS[itemId] ? ITEMS[itemId].icon : <div className="w-1 h-1 bg-white/20 rounded-full" />}
                <span className="absolute top-1 left-2 text-[10px] font-bold opacity-30">{idx + 1}</span>
              </div>
            ))}
          </div>

          {showBackpack && (
            <div className="absolute inset-0 bg-black/90 backdrop-blur-md z-[60] flex items-center justify-center p-6">
              <div className="bg-zinc-900 border border-white/10 w-full max-w-lg rounded-3xl p-8 relative shadow-2xl">
                <button onClick={() => setShowBackpack(false)} className="absolute top-6 right-6 text-zinc-500 hover:text-white transition-colors">
                  <LucideX size={28} />
                </button>
                <div className="flex items-center gap-3 mb-8">
                  <LucideBackpack className="text-red-600 w-8 h-8" />
                  <h2 className="text-2xl font-black italic tracking-tight">STORAGE UNIT</h2>
                </div>
                
                <div className="grid grid-cols-4 gap-4 mb-10">
                  {backpack.map((itemId, idx) => (
                    <div 
                      key={idx}
                      className="aspect-square bg-zinc-800 border border-white/5 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:bg-red-600/10 hover:border-red-600/40 transition-all group"
                      onClick={() => moveToHotbar(itemId, idx)}
                    >
                      <div className="group-hover:scale-110 transition-transform">{ITEMS[itemId].icon}</div>
                      <div className="text-[8px] mt-2 font-bold text-zinc-500 uppercase">{ITEMS[itemId].name}</div>
                    </div>
                  ))}
                  {[...Array(8 - backpack.length)].map((_, i) => (
                    <div key={i} className="aspect-square bg-black/40 border border-white/5 rounded-2xl border-dashed" />
                  ))}
                </div>
                <p className="text-center text-xs text-zinc-600 uppercase font-bold tracking-widest">Select item to equip to Hotbar</p>
              </div>
            </div>
          )}

          {gameRef.current.joystick.active && (
            <div 
              className="absolute w-24 h-24 border-2 border-white/10 rounded-full pointer-events-none"
              style={{ left: gameRef.current.joystick.startX - 48, top: gameRef.current.joystick.startY - 48 }}
            >
               <div 
                className="absolute w-12 h-12 bg-white/10 rounded-full backdrop-blur-sm"
                style={{ 
                  left: '50%', top: '50%',
                  transform: `translate(calc(-50% + ${gameRef.current.joystick.moveX * 35}px), calc(-50% + ${-gameRef.current.joystick.moveY * 35}px))` 
                }}
              />
            </div>
          )}
        </>
      )}

      <div className="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_center,_transparent_20%,_rgba(0,0,0,0.95)_100%)] shadow-[inset_0_0_150px_rgba(0,0,0,1)]" />
    </div>
  );
}
</script>
  </body>
</html>
